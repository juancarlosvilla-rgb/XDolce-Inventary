<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Dolce - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Usamos una imagen de placeholder que simule el logo de X Dolce -->
            <img src="https://ui-avatars.com/api/?name=X+D&background=fff&color=1a3696&bold=true&rounded=true" alt="X Dolce Logo" class="auth-logo">
            
            <h1 class="auth-title">X DOLCE</h1>
            <p class="auth-subtitle">REGISTRO DE USUARIO</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>NOMBRE COMPLETO</label>
                    <div class="input-container">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="regFullName" placeholder="Ej. Juan Pérez" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>CORREO ELECTRÓNICO</label>
                    <div class="input-container">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>USUARIO</label>
                    <div class="input-container">
                        <i class="fa-regular fa-user-circle"></i>
                        <input type="text" id="regUsername" placeholder="nuevo_usuario" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label>CONTRASEÑA</label>
                    <div class="input-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-auth">REGISTRARSE</button>
            </form>
            
            <div style="margin-top: 15px;">
                <a href="index.html" class="footer-link">Volver al Inicio de Sesión</a>
            </div>
        </div>
        <div style="text-align: center; margin-top: 40px; font-size: 10px; color: #999; letter-spacing: 1px;">
            X DOLCE © 2024 DIGITAL INVENTORY SHELL V.2.1
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
