<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Dolce - Acceso al Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Usamos una imagen de placeholder que simule el logo de X Dolce -->
            <img src="assets/images/logo.png"
                alt="X Dolce Logo" class="auth-logo">

            <h1 class="auth-title">X Dolce X</h1>
            <p class="auth-subtitle">ACCESO AL INVENTARIO</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>USUARIO</label>
                    <div class="input-container">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" placeholder="manager_id" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label>CONTRASEÑA</label>
                        <a href="#" style="font-size: 11px; margin-bottom: 8px;">¿OLVIDASTE?</a>
                    </div>
                    <div class="input-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="extra-options" style="margin-bottom: 25px;">
                    <label
                        style="display: flex; align-items: center; gap: 8px; font-weight: normal; text-transform: none; color: #666;">
                        <input type="checkbox" id="rememberMe"> MANTENER SESIÓN
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-auth">INICIAR SESIÓN</button>
            </form>

            <div style="margin-top: 15px;">
                <a href="register.html" class="footer-link">Crear una cuenta nueva</a>
            </div>
        </div>
        <div style="text-align: center; margin-top: 40px; font-size: 10px; color: #999; letter-spacing: 1px;">
            X DOLCE X © 2024 DIGITAL INVENTORY SHELL V.2.1
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
